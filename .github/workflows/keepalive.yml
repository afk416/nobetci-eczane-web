name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render web site
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 5 \
            https://nobetci-eczane-web.onrender.com/ > /dev/null
          echo "Web site pinged at $(date -u)"

      - name: Ping Render bot service
        continue-on-error: true
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 5 \
            https://nobetci-eczane-bot.onrender.com/ > /dev/null
          echo "Bot service pinged at $(date -u)"
