name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render site
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 5 \
            https://nobetci-eczane-web.onrender.com/ > /dev/null
          echo "Site pinged successfully at $(date -u)"
